name: NPM Publish Auto

on:
  push:
    branches:
      - main
    paths:
      - 'template/.agent/skills/**'
      - 'template/.agent/workflows/**'
      - 'bin/cli.js'
      - '!package.json'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Get Source Code Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ENV
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Auto-bump Version 
        run: |
          git config --global user.name "AG-Kit Bot"
          git config --global user.email "bot@xaviele.com"
          npm version patch -m "chore: Auto-bump version to %s [skip ci]"
          git push

      - name: Auto Publish to NPM Registry
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
